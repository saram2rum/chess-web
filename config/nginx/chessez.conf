# Chessez - Nginx 설정 (AWS EC2 배포용)
# /etc/nginx/sites-available/chess
# 적용: sudo ln -sfn /etc/nginx/sites-available/chess /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 리다이렉트 (SSL 적용 후 활성화)
# server {
#     listen 80;
#     server_name chessez.com www.chessez.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name chessez.com www.chessez.com;

    # SSL 적용 시 아래 listen 443 추가, listen 80은 제거 또는 redirect 서버로
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/chessez.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/chessez.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/chessez_access.log;
    error_log  /var/log/nginx/chessez_error.log;

    # 정적 리소스 (Spring이 JAR에서 제공) → 8080 프록시, 버퍼 설정으로 404/500 방지
    location ~ ^/(css|js|images|sounds)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # AI API → Spring(8080) → FastAPI(8000) (API Gateway 패턴)
    # Spring에서 Token Bucket/적응형 스케줄링 적용 후 FastAPI로 프록시
    location /ai/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket (1v1 대전) → Spring (8080번)
    location /ws-chess {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # 나머지 (/, HTML, REST) → Spring (8080번)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
