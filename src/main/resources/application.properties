spring.application.name=chess-spring
spring.thymeleaf.cache=false

# Actuator 메트릭 (관측용, 로그 수집에서 활용)
management.endpoints.web.exposure.include=metrics,health,info

# 메트릭 CSV 로그 파일 경로 (EC2: /home/ubuntu/logs/metrics.csv 등으로 오버라이드 가능)
metrics.log.path=logs/metrics.csv

# AI 대전 메뉴 (논문 연구 기간 중 비활성화, 1v1+형세분석만 사용)
app.feature.ai-match.enabled=false